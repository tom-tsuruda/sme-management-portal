{% extends "base.html" %}

{% block title %}製造インシデント登録{% endblock %}

{% block content %}
<style>
    .incident-form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px 14px;
        margin-top: 10px;
    }

    .incident-form-grid .full {
        grid-column: 1 / -1;
    }

    .incident-form-grid textarea {
        min-height: 86px;
        resize: vertical;
    }

    .compact-check {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        font-size: 13px;
    }

    .form-actions {
        margin-top: 14px;
    }

    @media (max-width: 768px) {
        .incident-form-grid {
            grid-template-columns: 1fr;
        }

        .incident-form-grid .full {
            grid-column: auto;
        }
    }
</style>

<div class="card">
    <h2>製造インシデント登録</h2>
    <p>
        <a href="{% url 'manufacturing:incident_list' %}">← インシデント一覧へ戻る</a>
    </p>

    <form method="post" action="{% url 'manufacturing:incident_create' %}">
        {% csrf_token %}

        <div class="incident-form-grid">
            <select name="area" class="input-full">
                {% for choice in area_choices %}
                    <option value="{{ choice }}">{{ choice }}</option>
                {% endfor %}
            </select>

            <input type="date" name="incident_date" class="input-full">

            <input
                type="text"
                name="title"
                required
                class="input-full full"
                placeholder="タイトル　例：出荷検査で寸法不良を検出"
            >

            <textarea
                name="description"
                rows="3"
                class="input-full full"
                placeholder="内容　発生内容、検出場所、影響範囲など"
            ></textarea>

            <select name="severity" class="input-full">
                {% for choice in severity_choices %}
                    <option value="{{ choice }}" {% if choice == "中" %}selected{% endif %}>
                        重大度：{{ choice }}
                    </option>
                {% endfor %}
            </select>

            <select name="status" class="input-full">
                {% for choice in status_choices %}
                    <option value="{{ choice }}" {% if choice == "未対応" %}selected{% endif %}>
                        状態：{{ choice }}
                    </option>
                {% endfor %}
            </select>

            <select name="detected_by_employee_id" class="input-full">
                <option value="">検出者：社員マスタから選択</option>
                {% for employee in employees %}
                    <option value="{{ employee.id }}">
                        {{ employee.employee_name }}（{{ employee.department_name }} / {{ employee.position_name }}）
                    </option>
                {% endfor %}
            </select>

            <input
                type="text"
                name="detected_by"
                class="input-full"
                placeholder="検出者を手入力"
            >

            <select name="owner_employee_id" class="input-full">
                <option value="">担当者：社員マスタから選択</option>
                {% for employee in employees %}
                    <option value="{{ employee.id }}">
                        {{ employee.employee_name }}（{{ employee.department_name }} / {{ employee.position_name }}）
                    </option>
                {% endfor %}
            </select>

            <input
                type="text"
                name="owner"
                class="input-full"
                placeholder="担当者を手入力"
            >

            <select name="related_management_item_id" class="input-full full">
                <option value="">関連管理項目：選択なし</option>
                {% for item in management_items %}
                    <option value="{{ item.id }}">
                        {{ item.id }}：{{ item.area }} / {{ item.item_name }}
                    </option>
                {% endfor %}
            </select>

            <textarea
                name="corrective_action"
                rows="3"
                class="input-full"
                placeholder="是正処置　発生原因に対する直接対応"
            ></textarea>

            <textarea
                name="preventive_action"
                rows="3"
                class="input-full"
                placeholder="再発防止策　仕組み・教育・標準化など"
            ></textarea>

            <label class="compact-check">
                <input type="checkbox" name="create_task" value="1">
                このインシデント対応タスクを作成する
            </label>

            <input type="date" name="due_date" class="input-full" title="タスク期限">
        </div>

        <div class="form-actions">
            <button type="submit">登録する</button>
        </div>
    </form>
</div>
{% endblock %}
