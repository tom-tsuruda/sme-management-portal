{% extends "base.html" %}

{% block title %}経費申請作成{% endblock %}

{% block content %}
<div class="card">
    <h2>経費申請作成</h2>
    <p>経費精算・旅費精算・交通費・購買立替などを申請します。</p>

    <div class="list-actions">
        <a href="{% url 'expenses:expense_list' %}">← 経費・旅費精算へ戻る</a>
    </div>
</div>

<div class="card">
    <form
        method="post"
        action="{% url 'expenses:expense_create' %}"
        enctype="multipart/form-data"
    >
        {% csrf_token %}

        <div class="app-form-grid">
            <select name="expense_type" class="input-full">
                {% for expense_type in expense_type_choices %}
                    <option value="{{ expense_type }}">{{ expense_type }}</option>
                {% endfor %}
            </select>

            <input
                type="text"
                name="title"
                required
                class="input-full"
                placeholder="件名　例：東京 出張交通費"
            >

            <div>
                <select name="applicant_employee_id" class="input-full">
                    <option value="">申請者：社員マスタから選択</option>
                    {% for employee in employees %}
                        <option value="{{ employee.id }}">
                            {{ employee.employee_name }}（{{ employee.department_name }} / {{ employee.position_name }}）
                        </option>
                    {% endfor %}
                </select>
                <div class="form-help">社員マスタを選択した場合は、選択した社員名が優先されます。</div>
            </div>

            <input
                type="text"
                name="applicant"
                class="input-full"
                placeholder="申請者を手入力"
            >

            <div>
                <select name="department_id" class="input-full">
                    <option value="">部署：申請者の部署を使う / 部署マスタから選択</option>
                    {% for department in departments %}
                        <option value="{{ department.id }}">
                            {{ department.department_name }}
                        </option>
                    {% endfor %}
                </select>
                <div class="form-help">部署未選択の場合は、申請者の所属部署を自動で使います。</div>
            </div>

            <input
                type="text"
                name="department"
                class="input-full"
                placeholder="部署を手入力"
            >

            <input
                type="date"
                name="expense_date"
                class="input-full date-input"
                title="利用日"
            >

            <select name="category" class="input-full">
                {% for category in expense_category_choices %}
                    <option value="{{ category }}">{{ category }}</option>
                {% endfor %}
            </select>

            <input
                type="text"
                name="amount"
                class="input-full"
                placeholder="金額　例：12,000"
            >

            <select name="payment_method" class="input-full">
                {% for payment_method in payment_method_choices %}
                    <option value="{{ payment_method }}">支払方法：{{ payment_method }}</option>
                {% endfor %}
            </select>

            <div>
                <select name="approver_employee_id" class="input-full">
                    <option value="">承認者：社員マスタから選択</option>
                    {% for approver in approvers %}
                        <option value="{{ approver.id }}">
                            {{ approver.employee_name }}（{{ approver.department_name }} / {{ approver.position_name }}）
                        </option>
                    {% endfor %}
                </select>
                <div class="form-help">承認者マスタを選択した場合は、選択した承認者名が優先されます。</div>
            </div>

            <input
                type="text"
                name="approver"
                class="input-full"
                placeholder="承認者を手入力"
            >

            <textarea
                name="description"
                rows="4"
                class="input-full full"
                placeholder="内容・目的　例：東京出張に伴う新幹線代"
            ></textarea>

            <input
                type="file"
                name="attachment"
                class="input-full full"
            >
        </div>

        <div class="form-actions">
            <button type="submit">申請する</button>
        </div>
    </form>
</div>
{% endblock %}
