{% extends "base.html" %}

{% block title %}製造KPI登録{% endblock %}

{% block content %}
<div class="card">
    <h2>製造KPI登録</h2>
    <p>生産数量、不良率、歩留まり、納期遵守率、設備稼働率などを登録します。</p>

    <div class="list-actions">
        <a href="{% url 'kpi:manufacturing_kpi_list' %}">← 製造KPI一覧へ戻る</a>
    </div>
</div>

<div class="card">
    <form method="post" action="{% url 'kpi:manufacturing_kpi_create' %}">
        {% csrf_token %}

        <div class="app-form-grid">
            <input
                type="month"
                name="year_month"
                class="input-full month-input"
                required
                title="対象月"
            >

            <input
                type="text"
                name="department"
                class="input-full"
                placeholder="部署　例：製造部"
            >

            <input
                type="text"
                name="production_volume"
                class="input-full"
                placeholder="生産数量　例：11800"
            >

            <input
                type="text"
                name="defect_count"
                class="input-full"
                placeholder="不良数　例：119"
            >

            <input
                type="text"
                name="defect_rate"
                class="input-full"
                placeholder="不良率（%）　例：1.01"
            >

            <input
                type="text"
                name="yield_rate"
                class="input-full"
                placeholder="歩留まり（%）　例：98.0"
            >

            <input
                type="text"
                name="on_time_delivery_rate"
                class="input-full"
                placeholder="納期遵守率（%）　例：97.3"
            >

            <input
                type="text"
                name="equipment_availability"
                class="input-full"
                placeholder="設備稼働率（%）　例：95.0"
            >

            <input
                type="text"
                name="downtime_hours"
                class="input-full"
                placeholder="停止時間　例：9.5"
            >

            <input
                type="text"
                name="accident_count"
                class="input-full"
                placeholder="労災件数　例：0"
            >

            <input
                type="text"
                name="near_miss_count"
                class="input-full"
                placeholder="ヒヤリハット件数　例：3"
            >

            <input
                type="text"
                name="quality_claim_count"
                class="input-full"
                placeholder="品質クレーム件数　例：1"
            >

            <input
                type="text"
                name="energy_usage"
                class="input-full"
                placeholder="エネルギー使用量　例：13900"
            >

            <textarea
                name="comment"
                rows="4"
                class="input-full full"
                placeholder="コメント　例：不良率・稼働率ともに改善。"
            ></textarea>
        </div>

        <div class="form-actions">
            <button type="submit">登録する</button>
        </div>
    </form>
</div>
{% endblock %}
