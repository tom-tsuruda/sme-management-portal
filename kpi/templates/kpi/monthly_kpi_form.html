{% extends "base.html" %}

{% block title %}月次経営KPI登録{% endblock %}

{% block content %}
<div class="card">
    <h2>月次経営KPI登録</h2>
    <p>売上・粗利・営業利益・現預金など、月次の経営指標を登録します。</p>

    <div class="list-actions">
        <a href="{% url 'kpi:monthly_kpi_list' %}">← 月次経営KPI一覧へ戻る</a>
    </div>
</div>

<div class="card">
    <form method="post" action="{% url 'kpi:monthly_kpi_create' %}">
        {% csrf_token %}

        <div class="app-form-grid">
            <input
                type="month"
                name="year_month"
                class="input-full month-input"
                required
                title="対象月"
            >

            <input
                type="text"
                name="sales_amount"
                class="input-full"
                placeholder="売上高　例：14800000"
            >

            <input
                type="text"
                name="gross_profit"
                class="input-full"
                placeholder="粗利　例：4900000"
            >

            <input
                type="text"
                name="operating_profit"
                class="input-full"
                placeholder="営業利益　例：1280000"
            >

            <input
                type="text"
                name="cash_balance"
                class="input-full"
                placeholder="現預金　例：9500000"
            >

            <input
                type="text"
                name="accounts_receivable"
                class="input-full"
                placeholder="売掛金　例：5200000"
            >

            <input
                type="text"
                name="accounts_payable"
                class="input-full"
                placeholder="買掛金　例：2900000"
            >

            <input
                type="text"
                name="expense_total"
                class="input-full"
                placeholder="経費合計　例：3620000"
            >

            <input
                type="text"
                name="new_orders"
                class="input-full"
                placeholder="新規受注件数　例：25"
            >

            <input
                type="text"
                name="order_backlog"
                class="input-full"
                placeholder="受注残　例：11100000"
            >

            <textarea
                name="comment"
                rows="4"
                class="input-full full"
                placeholder="コメント　例：受注好調。粗利率も改善。"
            ></textarea>
        </div>

        <div class="form-actions">
            <button type="submit">登録する</button>
        </div>
    </form>
</div>
{% endblock %}
