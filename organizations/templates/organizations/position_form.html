{% extends "base.html" %}

{% block title %}{% if position %}役職編集{% else %}役職追加{% endif %}{% endblock %}

{% block content %}
<div class="card">
    <h2>{% if position %}役職編集{% else %}役職追加{% endif %}</h2>

    <form method="post">
        {% csrf_token %}

        <div class="app-form-grid">
            <input
                type="text"
                name="position_code"
                class="input-full"
                value="{% if position %}{{ position.position_code }}{% endif %}"
                placeholder="役職コード（空欄の場合は自動採番）"
            >

            <input
                type="text"
                name="position_name"
                class="input-full"
                value="{% if position %}{{ position.position_name }}{% endif %}"
                placeholder="役職名"
                required
            >

            <input
                type="number"
                name="rank"
                class="input-full"
                value="{% if position %}{{ position.rank }}{% endif %}"
                placeholder="ランク"
            >

            <input
                type="text"
                name="approval_limit_amount"
                class="input-full"
                value="{% if position %}{{ position.approval_limit_amount }}{% endif %}"
                placeholder="承認上限額　例：1000000"
            >

            <input
                type="text"
                name="description"
                class="input-full full"
                value="{% if position %}{{ position.description }}{% endif %}"
                placeholder="説明"
            >

            <label class="check-field full">
                <input type="checkbox" name="is_active" value="1"
                    {% if not position or position.is_active == "1" %}checked{% endif %}>
                有効
            </label>
        </div>

        <div class="form-actions">
            <button type="submit">保存</button>
            <a class="clear-link" href="{% url 'organizations:position_list' %}">役職一覧へ戻る</a>
        </div>
    </form>
</div>
{% endblock %}
