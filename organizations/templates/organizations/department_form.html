{% extends "base.html" %}

{% block title %}{% if department %}部署編集{% else %}部署追加{% endif %}{% endblock %}

{% block content %}
<div class="card">
    <h2>{% if department %}部署編集{% else %}部署追加{% endif %}</h2>

    <form method="post">
        {% csrf_token %}

        <div class="app-form-grid">
            <input
                type="text"
                name="department_code"
                class="input-full"
                value="{% if department %}{{ department.department_code }}{% endif %}"
                placeholder="部署コード（空欄の場合は自動採番）"
            >

            <input
                type="text"
                name="department_name"
                class="input-full"
                value="{% if department %}{{ department.department_name }}{% endif %}"
                placeholder="部署名"
                required
            >

            <select name="parent_department_id" class="input-full">
                <option value="">上位部署：なし</option>
                {% for dept in departments %}
                    {% if not department or dept.id != department.id %}
                        <option value="{{ dept.id }}"
                            {% if department and department.parent_department_id == dept.id %}selected{% endif %}>
                            {{ dept.department_name }}
                        </option>
                    {% endif %}
                {% endfor %}
            </select>

            <select name="manager_employee_id" class="input-full">
                <option value="">責任者：未設定</option>
                {% for emp in employees %}
                    <option value="{{ emp.id }}"
                        {% if department and department.manager_employee_id == emp.id %}selected{% endif %}>
                        {{ emp.employee_name }}
                    </option>
                {% endfor %}
            </select>

            <input
                type="text"
                name="description"
                class="input-full full"
                value="{% if department %}{{ department.description }}{% endif %}"
                placeholder="説明"
            >

            <label class="check-field full">
                <input type="checkbox" name="is_active" value="1"
                    {% if not department or department.is_active == "1" %}checked{% endif %}>
                有効
            </label>
        </div>

        <div class="form-actions">
            <button type="submit">保存</button>
            <a class="clear-link" href="{% url 'organizations:department_list' %}">部署一覧へ戻る</a>
        </div>
    </form>
</div>
{% endblock %}
