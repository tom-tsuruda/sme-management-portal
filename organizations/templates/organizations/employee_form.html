{% extends "base.html" %}

{% block title %}{% if employee %}社員編集{% else %}社員追加{% endif %}{% endblock %}

{% block content %}
<div class="card">
    <h2>{% if employee %}社員編集{% else %}社員追加{% endif %}</h2>

    <form method="post">
        {% csrf_token %}

        <div class="app-form-grid">
            <input
                type="text"
                name="employee_name"
                class="input-full"
                value="{% if employee %}{{ employee.employee_name }}{% endif %}"
                placeholder="社員名"
                required
            >

            <input
                type="text"
                name="employee_code"
                class="input-full"
                value="{% if employee %}{{ employee.employee_code }}{% endif %}"
                placeholder="社員コード（空欄の場合は自動採番）"
            >

            <select name="department_id" class="input-full">
                <option value="">部署を選択</option>
                {% for department in departments %}
                    <option value="{{ department.id }}"
                        {% if employee and employee.department_id == department.id %}selected{% endif %}>
                        {{ department.department_name }}
                    </option>
                {% endfor %}
            </select>

            <select name="position_id" class="input-full">
                <option value="">役職を選択</option>
                {% for position in positions %}
                    <option value="{{ position.id }}"
                        {% if employee and employee.position_id == position.id %}selected{% endif %}>
                        {{ position.position_name }}
                    </option>
                {% endfor %}
            </select>

            <input
                type="email"
                name="email"
                class="input-full"
                value="{% if employee %}{{ employee.email }}{% endif %}"
                placeholder="メールアドレス"
            >

            <input
                type="text"
                name="role"
                class="input-full"
                value="{% if employee %}{{ employee.role }}{% endif %}"
                placeholder="役割・ロール"
            >

            <select name="supervisor_employee_id" class="input-full">
                <option value="">上長を選択</option>
                {% for emp in employees %}
                    {% if not employee or emp.id != employee.id %}
                        <option value="{{ emp.id }}"
                            {% if employee and employee.supervisor_employee_id == emp.id %}selected{% endif %}>
                            {{ emp.employee_name }}
                        </option>
                    {% endif %}
                {% endfor %}
            </select>

            <label class="check-field">
                <input type="checkbox" name="is_approver" value="1"
                    {% if employee and employee.is_approver == "1" %}checked{% endif %}>
                承認者にする
            </label>

            <label class="check-field">
                <input type="checkbox" name="is_active" value="1"
                    {% if not employee or employee.is_active == "1" %}checked{% endif %}>
                有効
            </label>
        </div>

        <div class="form-actions">
            <button type="submit">保存</button>
            <a class="clear-link" href="{% url 'organizations:employee_list' %}">社員一覧へ戻る</a>
        </div>
    </form>
</div>
{% endblock %}
