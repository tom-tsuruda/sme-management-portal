{% extends "base.html" %}

{% block title %}買掛金登録{% endblock %}

{% block content %}
<div class="card">
    <h2>買掛金登録</h2>

    <div class="list-actions">
        <a href="{% url 'accounting:payables_list' %}">← 買掛金一覧へ戻る</a>
    </div>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}

        <div class="app-form-grid">
            <input type="date" name="purchase_date" class="input-full date-input" title="発生日">

            <input type="text" name="vendor" class="input-full" placeholder="支払先">

            <input type="text" name="title" required class="input-full" placeholder="件名">

            <input type="text" name="amount" class="input-full" placeholder="金額　例：100,000">

            <input type="date" name="due_date" class="input-full date-input" title="支払予定日">

            <select name="status" class="input-full">
                {% for status in status_choices %}
                    <option value="{{ status }}">{{ status }}</option>
                {% endfor %}
            </select>

            <input type="date" name="paid_date" class="input-full date-input" title="支払日">

            <textarea name="memo" rows="4" class="input-full full" placeholder="メモ"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit">登録する</button>
        </div>
    </form>
</div>
{% endblock %}
