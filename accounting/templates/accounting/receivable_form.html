{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="card">
    <h2>{{ page_title }}</h2>

    <div class="list-actions">
        <a href="{% url 'accounting:payables_list' %}">← 買掛金一覧へ戻る</a>
        <a href="{% url 'accounting:accounting_home' %}">経理・決算へ戻る</a>
    </div>
</div>

{% if page_title == "買掛金が見つかりません" %}
<div class="card">
    <p>指定された買掛金データが見つかりません。</p>
</div>
{% else %}
<div class="card">
    <form method="post">
        {% csrf_token %}

        <div class="app-form-grid">
            <input
                type="date"
                name="purchase_date"
                value="{{ payable.purchase_date }}"
                class="input-full date-input"
                title="発生日"
            >

            <input
                type="text"
                name="vendor"
                value="{{ payable.vendor }}"
                class="input-full"
                placeholder="支払先"
            >

            <input
                type="text"
                name="title"
                value="{{ payable.title }}"
                required
                class="input-full"
                placeholder="件名"
            >

            <input
                type="text"
                name="amount"
                value="{{ payable.amount_display }}"
                class="input-full"
                placeholder="金額　例：100,000"
            >

            <input
                type="date"
                name="due_date"
                value="{{ payable.due_date }}"
                class="input-full date-input"
                title="支払予定日"
            >

            <select name="status" class="input-full">
                {% for status in status_choices %}
                    <option value="{{ status }}" {% if payable.status == status %}selected{% endif %}>
                        {{ status }}
                    </option>
                {% endfor %}
            </select>

            <input
                type="date"
                name="paid_date"
                value="{{ payable.paid_date }}"
                class="input-full date-input"
                title="支払日"
            >

            <textarea
                name="memo"
                rows="4"
                class="input-full full"
                placeholder="メモ"
            >{{ payable.memo }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit">{{ submit_label }}</button>
        </div>
    </form>
</div>
{% endif %}
{% endblock %}
