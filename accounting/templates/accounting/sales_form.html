{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="card">
    <h2>{{ page_title }}</h2>
    <p>売上を登録・編集します。売上登録時には売掛金も自動で作成・更新されます。</p>

    <div class="list-actions">
        <a href="{% url 'accounting:sales_list' %}">← 売上一覧へ戻る</a>
        <a href="{% url 'accounting:accounting_home' %}">経理・決算へ戻る</a>
    </div>
</div>

{% if page_title == "売上が見つかりません" %}
<div class="card">
    <p>指定された売上データが見つかりません。</p>
</div>
{% else %}
<div class="card">
    <form method="post">
        {% csrf_token %}

        <div class="app-form-grid">
            <input
                type="date"
                name="sale_date"
                value="{{ sale.sale_date }}"
                class="input-full date-input"
                title="売上日"
            >

            <input
                type="text"
                name="customer"
                value="{{ sale.customer }}"
                class="input-full"
                placeholder="得意先"
            >

            <input
                type="text"
                name="title"
                value="{{ sale.title }}"
                required
                class="input-full"
                placeholder="件名"
            >

            <input
                type="text"
                name="amount"
                value="{{ sale.amount_display }}"
                class="input-full"
                placeholder="金額　例：100,000"
            >

            <input
                type="text"
                name="tax_amount"
                value="{{ sale.tax_amount_display }}"
                class="input-full"
                placeholder="消費税　例：10,000"
            >

            <input
                type="date"
                name="due_date"
                value="{{ sale.due_date }}"
                class="input-full date-input"
                title="入金予定日"
            >

            <select name="status" class="input-full">
                {% for status in status_choices %}
                    <option value="{{ status }}" {% if sale.status == status %}selected{% endif %}>
                        {{ status }}
                    </option>
                {% endfor %}
            </select>

            <textarea
                name="memo"
                rows="4"
                class="input-full full"
                placeholder="メモ"
            >{{ sale.memo }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit">{{ submit_label }}</button>
        </div>
    </form>
</div>
{% endif %}
{% endblock %}
