<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}中小企業・経営ポータル{% endblock %}</title>
    <style>
        body {
            font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
            margin: 0;
            background: #f5f7fa;
            color: #222;
            font-size: 14px;
            line-height: 1.7;
        }

        header {
            background: #1f2937;
            color: white;
        }

        .inline-form {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            flex-wrap: wrap;
        }

        .small-button {
            padding: 5px 9px;
            font-size: 12px;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 12px 96px;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0.03em;
        }

        nav {
            background: #374151;
        }

        .nav-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 8px 96px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 18px;
            align-items: center;
        }

        nav a {
            color: white;
            margin-right: 18px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            display: inline-block;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
        max-width: 960px;
        margin: 0 auto;
        padding: 20px 96px 40px;
    }

        .card {
            background: white;
            padding: 20px 22px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 22px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            border-left: 5px solid #2563eb;
            padding-left: 10px;
            font-size: 18px;
            letter-spacing: 0.02em;
        }

        p {
            margin-top: 8px;
            margin-bottom: 8px;
        }

        a {
            color: #2563eb;
        }

        a:hover {
            color: #1d4ed8;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .summary-card {
            background: white;
            padding: 12px 16px;
            border-radius: 10px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.07);
            min-height: 72px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .summary-label {
            font-size: 13px;
            color: #4b5563;
            margin-bottom: 6px;
            line-height: 1.35;
            font-weight: 600;
            word-break: keep-all;
            overflow-wrap: normal;
        }

        .summary-number {
            font-size: 22px;
            font-weight: bold;
            color: #111827;
            line-height: 1.2;
            white-space: nowrap;
        }

        .summary-number small {
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
            color: #6b7280;
            margin-left: 6px;
        }

        .summary-card {
            background: white;
            padding: 10px 14px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            min-height: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            box-sizing: border-box;
        }

        .summary-label {
            font-size: 14px;
            color: #4b5563;
            margin: 0;
            line-height: 1.4;
            font-weight: 600;
            word-break: keep-all;
        }

        .summary-number {
            font-size: 20px;
            font-weight: bold;
            color: #111827;
            line-height: 1;
            white-space: nowrap;
        }

        .summary-number.danger {
            color: #dc2626;
        }

        .summary-number.warning {
            color: #d97706;
        }

        .table-wrap {
            overflow-x: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 13px;
            min-width: 900px;
        }

        th {
            background: #e5e7eb;
            font-weight: bold;
            white-space: nowrap;
        }

        th, td {
            border: 1px solid #d1d5db;
            padding: 8px 10px;
            text-align: left;
            vertical-align: middle;
        }

        tr:nth-child(even) td {
            background: #fafafa;
        }

        .search-form {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
        }

        .count-text {
            color: #6b7280;
            font-size: 13px;
            margin-top: 10px;
        }

        .search-form input {
            width: 360px;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
        }

        .clear-link {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }

        .clear-link:hover {
            text-decoration: underline;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        button:hover {
            background: #1d4ed8;
        }

        select {
            font-family: inherit;
            font-size: 13px;
            padding: 5px 7px;
        }

        input,
        textarea {
            font-family: inherit;
            font-size: 13px;
        }

        .form-row {
            margin-bottom: 16px;
        }

        .input-long {
            width: 520px;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        .input-middle {
            width: 360px;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        .input-full {
            width: 100%;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .amount-input {
            width: 180px;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        .menu-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .menu-item {
            display: block;
            background: white;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            color: #111827;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            font-weight: bold;
            font-size: 14px;
        }

        .menu-item:hover {
            background: #eff6ff;
        }

        .badge-high {
            color: white;
            background: #dc2626;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-middle {
            color: white;
            background: #d97706;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-low {
            color: white;
            background: #059669;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-status {
            color: white;
            background: #4b5563;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .header-inner,
            .nav-inner,
            main {
                padding-left: 20px;
                padding-right: 20px;
            }

            .menu-list {
                grid-template-columns: 1fr;
            }

            nav a {
                display: inline-block;
                margin-bottom: 6px;
            }
        }
        .top-fixed {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #1f2937;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }
        .scroll-list {
            max-height: 305px;
            overflow-y: auto;
            border-radius: 10px;
        }

        .scroll-list table {
            margin-bottom: 0;
        }

        .scroll-list thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #e5e7eb;
        }
        .summary-number small {
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
            color: #6b7280;
            margin-left: 6px;
        }
        /* =========================================================
   共通デザイン調整
   フォーム・ボタン・テーブル・バッジの見た目を統一
   ========================================================= */

    :root {
        --primary-color: #2563eb;
        --primary-hover: #1d4ed8;
        --border-color: #d1d5db;
        --border-soft: #e5e7eb;
        --bg-page: #f5f7fa;
        --bg-card: #ffffff;
        --text-main: #111827;
        --text-sub: #6b7280;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --shadow-soft: 0 4px 12px rgba(15, 23, 42, 0.08);
        --shadow-card: 0 6px 18px rgba(15, 23, 42, 0.08);
    }

    /* ページ全体 */
    body {
        background: var(--bg-page);
        color: var(--text-main);
    }

    /* カード */
    .card,
    .summary-card,
    .menu-item,
    .document-category-block,
    .table-wrap {
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        border: 1px solid rgba(226, 232, 240, 0.9);
    }

    /* 入力欄・選択欄・テキストエリア共通 */
    input[type="text"],
    input[type="number"],
    input[type="date"],
    input[type="email"],
    input[type="password"],
    input[type="search"],
    input[type="file"],
    select,
    textarea,
    .search-form input,
    .input-long,
    .input-middle,
    .input-full,
    .amount-input {
        font-family: inherit;
        font-size: 13px;
        line-height: 1.5;
        color: var(--text-main);
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: var(--radius-md);
        padding: 9px 12px;
        box-sizing: border-box;
        outline: none;
        transition:
            border-color 0.15s ease,
            box-shadow 0.15s ease,
            background-color 0.15s ease;
    }

    /* selectの高さをinputと揃える */
    select {
        min-height: 38px;
        padding-right: 32px;
    }

    /* file inputは少し控えめ */
    input[type="file"] {
        width: 100%;
        max-width: 520px;
        background: #f8fafc;
    }

    /* フォーカス時 */
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="search"]:focus,
    input[type="file"]:focus,
    select:focus,
    textarea:focus,
    .search-form input:focus,
    .input-long:focus,
    .input-middle:focus,
    .input-full:focus,
    .amount-input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        background: #ffffff;
    }

    /* ボタン共通 */
    button,
    input[type="submit"],
    .button,
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 38px;
        padding: 9px 16px;
        border: none;
        border-radius: var(--radius-md);
        background: var(--primary-color);
        color: #ffffff;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.2;
        text-decoration: none;
        cursor: pointer;
        box-shadow: 0 3px 8px rgba(37, 99, 235, 0.22);
        transition:
            background-color 0.15s ease,
            box-shadow 0.15s ease,
            transform 0.08s ease;
    }

    button:hover,
    input[type="submit"]:hover,
    .button:hover,
    .btn:hover {
        background: var(--primary-hover);
        color: #ffffff;
        text-decoration: none;
        box-shadow: 0 5px 12px rgba(37, 99, 235, 0.28);
    }

    button:active,
    input[type="submit"]:active,
    .button:active,
    .btn:active {
        transform: translateY(1px);
    }

    /* 小さいボタン */
    .small-button {
        min-height: 30px;
        padding: 6px 10px;
        border-radius: var(--radius-sm);
        font-size: 12px;
    }

    /* クリアリンクなどをボタン風にしすぎない */
    .clear-link {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 4px;
        color: var(--primary-color);
        font-weight: 700;
        text-decoration: none;
    }

    .clear-link:hover {
        color: var(--primary-hover);
        text-decoration: underline;
    }

    /* フォームレイアウト */
    form {
        margin: 0;
    }

    .inline-form,
    .search-form,
    .task-create-form {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .form-row label {
        display: block;
        margin-bottom: 5px;
        color: #374151;
        font-weight: 700;
    }

    /* テーブル */
    .table-wrap {
        overflow-x: auto;
        background: #ffffff;
    }

    table {
        border-collapse: separate;
        border-spacing: 0;
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-md);
        overflow: hidden;
    }

    th,
    td {
        border: none;
        border-bottom: 1px solid var(--border-soft);
        padding: 10px 12px;
    }

    th {
        background: #f1f5f9;
        color: #334155;
        font-weight: 800;
    }

    tr:last-child td {
        border-bottom: none;
    }

    tr:nth-child(even) td {
        background: #fbfdff;
    }

    tr:hover td {
        background: #eff6ff;
    }

    /* バッジ共通 */
    .badge-high,
    .badge-middle,
    .badge-low,
    .badge-status,
    .status-badge,
    .risk-badge,
    .template-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 24px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        line-height: 1.2;
        text-decoration: none;
        white-space: nowrap;
    }

    /* 既存バッジの角ばり解消 */
    .badge-high {
        background: #dc2626;
        color: #ffffff;
    }

    .badge-middle {
        background: #d97706;
        color: #ffffff;
    }

    .badge-low {
        background: #059669;
        color: #ffffff;
    }

    .badge-status {
        background: #4b5563;
        color: #ffffff;
    }

    /* ひな形・完成文書リンク */
    .template-badge.available {
        background: #dbeafe;
        color: #1d4ed8;
    }

    a.template-badge.available:hover {
        background: #bfdbfe;
        color: #1e40af;
        text-decoration: none;
    }

    .template-badge.none {
        background: #e5e7eb;
        color: #374151;
    }

    /* details / summary */
    details {
        border-radius: var(--radius-lg);
    }

    summary {
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    /* ナビゲーション */
    nav a {
        border-radius: 999px;
        padding: 4px 8px;
        transition: background-color 0.15s ease;
    }

    nav a:hover {
        background: rgba(255, 255, 255, 0.12);
        text-decoration: none;
    }

    /* メニューカード */
    .menu-item {
        transition:
            background-color 0.15s ease,
            transform 0.08s ease,
            box-shadow 0.15s ease;
    }

    .menu-item:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
    }

    /* スマホ時 */
    @media (max-width: 768px) {
        .search-form,
        .inline-form,
        .task-create-form {
            align-items: stretch;
            flex-direction: column;
        }

        .search-form input,
        .inline-form input,
        .inline-form select,
        .task-create-form input,
        .task-create-form select,
        button {
            width: 100%;
        }

        table {
            min-width: 720px;
        }
    }
    /* =========================================================
   テーブル内フィルター共通デザイン
   ========================================================= */

   .search-form {
        display: none !important;
    }

    .table-filter-row th {
        background: #f8fafc;
        padding: 7px 8px;
        border-bottom: 1px solid #dbe3ef;
    }

    .table-filter-input {
        width: 100%;
        min-width: 90px;
        height: 34px;
        padding: 7px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        background: #ffffff;
        color: #111827;
        font-family: inherit;
        font-size: 12px;
        box-sizing: border-box;
        outline: none;
        transition:
            border-color 0.15s ease,
            box-shadow 0.15s ease,
            background-color 0.15s ease;
    }

    .table-filter-input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .table-filter-input::placeholder {
        color: #94a3b8;
    }

    .table-filter-clear {
        margin-left: 8px;
        font-size: 12px;
        font-weight: 700;
        color: #2563eb;
        cursor: pointer;
        text-decoration: none;
    }

    .table-filter-clear:hover {
        color: #1d4ed8;
        text-decoration: underline;
    }

    .table-filter-status {
        margin-top: 8px;
        color: #64748b;
        font-size: 12px;
    }
    </style>
</head>
<body>
    <div class="top-fixed">
        <header>
            <div class="header-inner">
                <h1>中小企業・経営ポータル</h1>
            </div>
        </header>

        <nav>
            <div class="nav-inner">
                <a href="/">TOP</a>
                <a href="/documents/">文書台帳</a>
                <a href="/tasks/">タスク管理</a>
                <a href="/questionnaires/">質問票</a>
                <a href="/questionnaires/history/">診断履歴</a>
                <a href="/workflows/">申請・承認</a>
                <a href="/expenses/">経費・旅費精算</a>
                <a href="/organizations/">組織マスタ</a>
                <a href="/manufacturing/">製造管理</a>
                <a href="/manufacturing/incidents/">製造インシデント</a>
                <a href="/kpi/">経営指標</a>
                <a href="/governance/">ガバナンス</a>
                <a href="/notifications/">通知</a>
            </div>
        </nav>
    </div>

    <main>
        {% block content %}
        {% endblock %}
    </main>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tables = document.querySelectorAll("main table");
        
            tables.forEach(function (table) {
                if (table.classList.contains("no-column-filter")) {
                    return;
                }
        
                const thead = table.querySelector("thead");
                const tbody = table.querySelector("tbody");
        
                if (!thead || !tbody) {
                    return;
                }
        
                const headerRow = thead.querySelector("tr");
        
                if (!headerRow) {
                    return;
                }
        
                if (thead.querySelector(".table-filter-row")) {
                    return;
                }
        
                const headerCells = Array.from(headerRow.children);
        
                if (headerCells.length === 0) {
                    return;
                }
        
                const filterRow = document.createElement("tr");
                filterRow.className = "table-filter-row";
        
                headerCells.forEach(function (headerCell, columnIndex) {
                    const filterCell = document.createElement("th");
        
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "table-filter-input";
        
                    const label = headerCell.textContent.trim();
                    input.placeholder = label ? label + "で絞込" : "絞込";
                    input.dataset.columnIndex = columnIndex;
        
                    filterCell.appendChild(input);
                    filterRow.appendChild(filterCell);
                });
        
                thead.appendChild(filterRow);
        
                const status = document.createElement("div");
                status.className = "table-filter-status";
                table.parentElement.insertAdjacentElement("afterend", status);
        
                const rows = Array.from(tbody.querySelectorAll("tr"));
        
                function normalizeText(value) {
                    return String(value || "")
                        .replace(/\s+/g, " ")
                        .trim()
                        .toLowerCase();
                }
        
                function applyFilters() {
                    const filters = Array.from(filterRow.querySelectorAll(".table-filter-input"))
                        .map(function (input) {
                            return {
                                columnIndex: Number(input.dataset.columnIndex),
                                value: normalizeText(input.value)
                            };
                        })
                        .filter(function (filter) {
                            return filter.value !== "";
                        });
        
                    let visibleCount = 0;
        
                    rows.forEach(function (row) {
                        const cells = Array.from(row.children);
        
                        const matched = filters.every(function (filter) {
                            const cell = cells[filter.columnIndex];
        
                            if (!cell) {
                                return false;
                            }
        
                            const cellText = normalizeText(cell.textContent);
                            return cellText.includes(filter.value);
                        });
        
                        if (matched) {
                            row.style.display = "";
                            visibleCount += 1;
                        } else {
                            row.style.display = "none";
                        }
                    });
        
                    if (filters.length > 0) {
                        status.textContent = visibleCount + "件を表示中";
                    } else {
                        status.textContent = "";
                    }
                }
        
                filterRow.querySelectorAll(".table-filter-input").forEach(function (input) {
                    input.addEventListener("input", applyFilters);
                });
            });
        });
        </script>
</body>
</html>
