<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}中小企業・経営ポータル{% endblock %}</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #111827;
            --sub: #6b7280;
            --line: #d1d5db;
            --head: #1f2937;
            --nav: #374151;
            --blue: #2563eb;
            --blue-hover: #1d4ed8;
            --red: #dc2626;
            --orange: #d97706;
            --green: #059669;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
            font-size: 14px;
            line-height: 1.7;
        }

        a {
            color: var(--blue);
            text-decoration: none;
        }

        a:hover {
            color: var(--blue-hover);
            text-decoration: underline;
        }

        .top-fixed {
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        header {
            background: var(--head);
            color: #ffffff;
        }

        .header-inner,
        .nav-inner,
        main {
            max-width: 1160px;
            margin: 0 auto;
            padding-left: 32px;
            padding-right: 32px;
        }

        .header-inner {
            padding-top: 12px;
            padding-bottom: 12px;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
        }

        nav {
            background: var(--nav);
        }

        .nav-inner {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            padding-top: 8px;
            padding-bottom: 8px;
        }

        nav a {
            color: #ffffff;
            font-weight: bold;
            font-size: 13px;
            padding: 3px 6px;
        }

        main {
            padding-top: 20px;
            padding-bottom: 40px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            padding-left: 10px;
            border-left: 5px solid var(--blue);
            font-size: 18px;
        }

        .card,
        .summary-card,
        .menu-item,
        .table-wrap,
        .document-category-block {
            background: var(--card);
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .card {
            padding: 20px 22px;
            margin-bottom: 22px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .summary-card {
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .summary-label {
            color: #4b5563;
            font-weight: bold;
            line-height: 1.4;
        }

        .summary-number {
            font-size: 20px;
            font-weight: bold;
            white-space: nowrap;
        }

        .summary-number.danger {
            color: var(--red);
        }

        .summary-number.warning {
            color: var(--orange);
        }

        .summary-number small {
            margin-left: 5px;
            color: var(--sub);
            font-size: 12px;
        }

        .menu-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .menu-item {
            display: block;
            padding: 16px;
            color: var(--text);
            font-weight: bold;
        }

        .menu-item:hover {
            background: #eff6ff;
            text-decoration: none;
        }

        /* ==============================
           共通：通常テーブル
           ============================== */

        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            font-size: 13px;
        }

        th,
        td {
            border: 1px solid var(--line);
            padding: 8px 10px;
            text-align: center;
            vertical-align: middle;
        }

        th {
            background: #e5e7eb;
            font-weight: bold;
            white-space: nowrap;
        }

        tr:nth-child(even) td {
            background: #fafafa;
        }

        .table-wrap {
            overflow-x: auto;
            margin-bottom: 16px;
        }

        /* ==============================
           共通：一覧テーブル
           list-frame  = 外枠・角丸・影
           list-scroll = 高さ制限・縦スクロール
           list-table  = テーブル本体
           ============================== */

        .list-frame {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .list-scroll {
            max-height: 300px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-gutter: stable;
        }

        .list-table {
            width: 100%;
            min-width: 0;
            max-width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
            background: #ffffff;
            font-size: 13px;
        }

        .list-table th,
        .list-table td {
            border: 1px solid var(--line);
            padding: 8px 10px;
            text-align: center;
            vertical-align: middle;
            overflow: hidden;
        }

        .list-table th {
            background: #e5e7eb;
            font-weight: bold;
            white-space: nowrap;
        }

        .list-table tr:nth-child(even) td {
            background: #fafafa;
        }

        .list-scroll thead th {
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .table-filter-row th {
            background: #f8fafc;
            padding: 6px 8px;
            text-align: center;
        }

        .table-filter-input {
            width: 100%;
            min-width: 0;
            height: 32px;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 0;
            background: #ffffff;
            font-size: 12px;
            text-align: center;
        }

        .table-filter-input::placeholder {
            color: #94a3b8;
        }

        .table-filter-status {
            color: var(--sub);
            font-size: 13px;
            padding: 6px 10px 8px;
            background: #ffffff;
        }

        .text-left {
            text-align: left !important;
        }

        .text-center {
            text-align: center !important;
        }

        .text-right {
            text-align: right !important;
        }

        .nowrap {
            white-space: nowrap !important;
        }

        .long-text {
            white-space: normal;
            word-break: break-word;
        }

        /* ==============================
           共通：フォーム
           ============================== */

        input,
        select,
        textarea,
        button {
            font-family: inherit;
            font-size: 13px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="email"],
        input[type="password"],
        input[type="search"],
        input[type="file"],
        select,
        textarea,
        .input-long,
        .input-middle,
        .input-full,
        .amount-input,
        .date-input {
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            background: #ffffff;
            color: var(--text);
        }

        input[type="date"],
        .date-input {
            height: 38px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
        }

        .input-long {
            width: 520px;
            max-width: 100%;
        }

        .input-middle {
            width: 360px;
            max-width: 100%;
        }

        .input-full {
            width: 100%;
        }

        .amount-input {
            width: 180px;
            max-width: 100%;
        }

        button,
        input[type="submit"],
        .button,
        .btn {
            display: inline-block;
            padding: 8px 14px;
            border: none;
            border-radius: 4px;
            background: var(--blue);
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        button:hover,
        input[type="submit"]:hover,
        .button:hover,
        .btn:hover {
            background: var(--blue-hover);
            color: #ffffff;
            text-decoration: none;
        }

        .small-button {
            padding: 5px 9px;
            font-size: 12px;
        }

        .inline-form,
        .task-create-form {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 0;
        }

        .form-row {
            margin-bottom: 16px;
        }

        .form-row label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .search-form {
            display: none !important;
        }

        .count-text {
            color: var(--sub);
            font-size: 13px;
            margin-top: 8px;
        }

        .list-actions,
        .form-actions {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .list-actions button,
        .list-actions a,
        .form-actions button,
        .form-actions a {
            flex: 0 0 auto;
        }

        /* ==============================
           共通：バッジ
           ============================== */

        .badge-high,
        .badge-middle,
        .badge-low,
        .badge-status,
        .status-badge,
        .risk-badge,
        .template-badge {
            display: inline-block;
            padding: 3px 7px;
            border-radius: 4px;
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .badge-high {
            background: var(--red);
        }

        .badge-middle {
            background: var(--orange);
        }

        .badge-low {
            background: var(--green);
        }

        .badge-status {
            background: #4b5563;
        }

        .status-badge.not-ready {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-badge.progress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.ready {
            background: #dcfce7;
            color: #166534;
        }

        .status-badge.na {
            background: #e0e7ff;
            color: #3730a3;
        }

        .risk-badge.high {
            background: #fee2e2;
            color: #991b1b;
        }

        .risk-badge.middle {
            background: #fef3c7;
            color: #92400e;
        }

        .risk-badge.low {
            background: #dcfce7;
            color: #166534;
        }

        .template-badge.available {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .template-badge.none {
            background: #e5e7eb;
            color: #374151;
        }

        @media (max-width: 768px) {
            .header-inner,
            .nav-inner,
            main {
                padding-left: 16px;
                padding-right: 16px;
            }

            .summary-grid,
            .menu-list {
                grid-template-columns: 1fr;
            }

            .inline-form,
            .task-create-form,
            .list-actions,
            .form-actions {
                align-items: stretch;
                flex-direction: column;
            }

            .inline-form input,
            .inline-form select,
            .task-create-form input,
            .task-create-form select,
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="top-fixed">
        <header>
            <div class="header-inner">
                <h1>中小企業・経営ポータル</h1>
            </div>
        </header>

        <nav>
            <div class="nav-inner">
                <a href="/">TOP</a>
                <a href="/kpi/">経営指標</a>
                <a href="/manufacturing/">製造管理</a>
                <a href="/questionnaires/">経営診断</a>
                <a href="/tasks/">タスク管理</a>
                <a href="/documents/">文書台帳</a>
                <a href="/organizations/">組織マスタ</a>
                <a href="/workflows/">申請・承認</a>
                <a href="/expenses/">経費・旅費精算</a>
                <a href="/notifications/">操作履歴</a>
            </div>
        </nav>
    </div>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tables = document.querySelectorAll("main table.list-table");

            tables.forEach(function (table) {
                if (table.classList.contains("no-column-filter")) {
                    return;
                }

                const thead = table.querySelector("thead");
                const tbody = table.querySelector("tbody");

                if (!thead || !tbody) {
                    return;
                }

                const headerRow = thead.querySelector("tr");

                if (!headerRow) {
                    return;
                }

                if (thead.querySelector(".table-filter-row")) {
                    return;
                }

                const headerCells = Array.from(headerRow.children);

                if (headerCells.length === 0) {
                    return;
                }

                const filterRow = document.createElement("tr");
                filterRow.className = "table-filter-row";

                headerCells.forEach(function (headerCell, columnIndex) {
                    const filterCell = document.createElement("th");

                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "table-filter-input";

                    const label = headerCell.textContent.trim();
                    input.placeholder = label ? label + "で絞込" : "絞込";
                    input.dataset.columnIndex = columnIndex;

                    filterCell.appendChild(input);
                    filterRow.appendChild(filterCell);
                });

                thead.appendChild(filterRow);

                const status = document.createElement("div");
                status.className = "table-filter-status";

                const scrollContainer = table.closest(".list-scroll");
                if (scrollContainer) {
                    scrollContainer.insertAdjacentElement("afterend", status);
                }

                const rows = Array.from(tbody.querySelectorAll("tr"));

                function normalizeText(value) {
                    return String(value || "")
                        .replace(/\s+/g, " ")
                        .trim()
                        .toLowerCase();
                }

                function applyFilters() {
                    const filters = Array.from(filterRow.querySelectorAll(".table-filter-input"))
                        .map(function (input) {
                            return {
                                columnIndex: Number(input.dataset.columnIndex),
                                value: normalizeText(input.value)
                            };
                        })
                        .filter(function (filter) {
                            return filter.value !== "";
                        });

                    let visibleCount = 0;

                    rows.forEach(function (row) {
                        const cells = Array.from(row.children);

                        const matched = filters.every(function (filter) {
                            const cell = cells[filter.columnIndex];

                            if (!cell) {
                                return false;
                            }

                            const cellText = normalizeText(cell.textContent);
                            return cellText.includes(filter.value);
                        });

                        if (matched) {
                            row.style.display = "";
                            visibleCount += 1;
                        } else {
                            row.style.display = "none";
                        }
                    });

                    if (filters.length > 0) {
                        status.textContent = visibleCount + "件を表示中";
                    } else {
                        status.textContent = "";
                    }
                }

                filterRow.querySelectorAll(".table-filter-input").forEach(function (input) {
                    input.addEventListener("input", applyFilters);
                });
            });
        });
    </script>
</body>
</html>
