{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}中小企業・経営ポータル{% endblock %}</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
    <div class="top-fixed">
        <header>
            <div class="header-inner">
                <h1>中小企業・経営ポータル</h1>
            </div>
        </header>

        <nav>
            <div class="nav-inner">
                <a href="/">TOP</a>
                <a href="/kpi/">経営指標</a>
                <a href="/manufacturing/">製造管理</a>
                <a href="/questionnaires/">経営診断</a>
                <a href="/tasks/">タスク管理</a>
                <a href="/documents/">文書台帳</a>
                <a href="/organizations/">組織マスタ</a>
                <a href="/workflows/">申請・承認</a>
                <a href="/expenses/">経費・旅費精算</a>
                <a href="{% url 'accounting:accounting_home' %}">経理・決算</a>
                <a href="/notifications/">操作履歴</a>
            </div>
        </nav>
    </div>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tables = document.querySelectorAll("main table.list-table");

            tables.forEach(function (table) {
                if (table.classList.contains("no-column-filter")) {
                    return;
                }

                const thead = table.querySelector("thead");
                const tbody = table.querySelector("tbody");

                if (!thead || !tbody) {
                    return;
                }

                const headerRow = thead.querySelector("tr");

                if (!headerRow) {
                    return;
                }

                if (thead.querySelector(".table-filter-row")) {
                    return;
                }

                const headerCells = Array.from(headerRow.children);

                if (headerCells.length === 0) {
                    return;
                }

                const filterRow = document.createElement("tr");
                filterRow.className = "table-filter-row";

                headerCells.forEach(function (headerCell, columnIndex) {
                    const filterCell = document.createElement("th");

                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "table-filter-input";

                    const label = headerCell.textContent.trim();
                    input.placeholder = label ? label + "で絞込" : "絞込";
                    input.dataset.columnIndex = columnIndex;

                    filterCell.appendChild(input);
                    filterRow.appendChild(filterCell);
                });

                thead.appendChild(filterRow);

                const status = document.createElement("div");
                status.className = "table-filter-status";

                const scrollContainer = table.closest(".list-scroll");
                if (scrollContainer) {
                    scrollContainer.insertAdjacentElement("afterend", status);
                }

                const rows = Array.from(tbody.querySelectorAll("tr"));

                function normalizeText(value) {
                    return String(value || "")
                        .replace(/\s+/g, " ")
                        .trim()
                        .toLowerCase();
                }

                function applyFilters() {
                    const filters = Array.from(filterRow.querySelectorAll(".table-filter-input"))
                        .map(function (input) {
                            return {
                                columnIndex: Number(input.dataset.columnIndex),
                                value: normalizeText(input.value)
                            };
                        })
                        .filter(function (filter) {
                            return filter.value !== "";
                        });

                    let visibleCount = 0;

                    rows.forEach(function (row) {
                        const cells = Array.from(row.children);

                        const matched = filters.every(function (filter) {
                            const cell = cells[filter.columnIndex];

                            if (!cell) {
                                return false;
                            }

                            const cellText = normalizeText(cell.textContent);
                            return cellText.includes(filter.value);
                        });

                        if (matched) {
                            row.style.display = "";
                            visibleCount += 1;
                        } else {
                            row.style.display = "none";
                        }
                    });

                    status.textContent = filters.length > 0 ? visibleCount + "件を表示中" : "";
                }

                filterRow.querySelectorAll(".table-filter-input").forEach(function (input) {
                    input.addEventListener("input", applyFilters);
                });
            });
        });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            function stripComma(value) {
                return String(value || "").replace(/,/g, "");
            }

            function formatComma(value) {
                let text = stripComma(value).trim();

                if (text === "") {
                    return "";
                }

                const isNegative = text.startsWith("-");
                if (isNegative) {
                    text = text.slice(1);
                }

                const parts = text.split(".");
                let integerPart = parts[0].replace(/[^\d]/g, "");
                let decimalPart = parts.length > 1 ? parts[1].replace(/[^\d]/g, "") : "";

                if (integerPart === "") {
                    return isNegative ? "-" : "";
                }

                integerPart = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");

                let result = integerPart;

                if (parts.length > 1) {
                    result += "." + decimalPart;
                }

                if (isNegative) {
                    result = "-" + result;
                }

                return result;
            }

            function formatInputKeepingCursor(input) {
                const originalValue = input.value;
                const originalPosition = input.selectionStart || 0;

                const commaCountBefore = (originalValue.slice(0, originalPosition).match(/,/g) || []).length;
                const plainPosition = originalPosition - commaCountBefore;

                const formattedValue = formatComma(originalValue);
                input.value = formattedValue;

                let nextPosition = 0;
                let plainCount = 0;

                while (nextPosition < formattedValue.length && plainCount < plainPosition) {
                    if (formattedValue[nextPosition] !== ",") {
                        plainCount += 1;
                    }
                    nextPosition += 1;
                }

                input.setSelectionRange(nextPosition, nextPosition);
            }

            document.querySelectorAll(".comma-number-input").forEach(function (input) {
                input.inputMode = "decimal";
                input.value = formatComma(input.value);

                input.addEventListener("input", function () {
                    formatInputKeepingCursor(input);
                });

                input.addEventListener("blur", function () {
                    input.value = formatComma(input.value);
                });
            });

            document.querySelectorAll("form").forEach(function (form) {
                form.addEventListener("submit", function () {
                    form.querySelectorAll(".comma-number-input").forEach(function (input) {
                        input.value = stripComma(input.value);
                    });
                });
            });
        });
    </script>
</body>
</html>
