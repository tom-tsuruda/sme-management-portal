<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}中小企業・経営ポータル{% endblock %}</title>
    <style>
        body {
            font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
            margin: 0;
            background: #f5f7fa;
            color: #222;
            font-size: 14px;
            line-height: 1.7;
        }

        header {
            background: #1f2937;
            color: white;
        }

        .header-inner {
            max-width: 1080px;
            margin: 0 auto;
            padding: 12px 72px;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0.03em;
        }

        nav {
            background: #374151;
        }

        .nav-inner {
            max-width: 1080px;
            margin: 0 auto;
            padding: 8px 72px;
        }

        nav a {
            color: white;
            margin-right: 18px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            max-width: 1080px;
            margin: 0 auto;
            padding: 28px 72px 48px;
        }

        .card {
            background: white;
            padding: 20px 22px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 22px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            border-left: 5px solid #2563eb;
            padding-left: 10px;
            font-size: 18px;
            letter-spacing: 0.02em;
        }

        p {
            margin-top: 8px;
            margin-bottom: 8px;
        }
	a {
	    color: #2563eb;
	}

	a:hover {
	    color: #1d4ed8;
	}
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 22px;
        }

        .summary-card {
            background: white;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .summary-label {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .summary-number {
            font-size: 26px;
            font-weight: bold;
            color: #111827;
        }

        .summary-number.danger {
            color: #dc2626;
        }

        .summary-number.warning {
            color: #d97706;
        }

        .table-wrap {
            overflow-x: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 13px;
            min-width: 900px;
        }

        th {
            background: #e5e7eb;
            font-weight: bold;
            white-space: nowrap;
        }

        th, td {
            border: 1px solid #d1d5db;
            padding: 8px 10px;
            text-align: left;
            vertical-align: middle;
        }

        tr:nth-child(even) td {
            background: #fafafa;
        }
        .search-form {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
        }
        .count-text {
            color: #6b7280;
            font-size: 13px;
            margin-top: 10px;
        }
        .inline-form {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0;
        }

        .small-button {
            padding: 5px 9px;
            font-size: 12px;
        }
        .search-form input {
            width: 360px;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
        }
        .task-create-form {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .task-create-form input,
        .task-create-form select {
            padding: 7px 9px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
        }
        .clear-link {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }

        .clear-link:hover {
            text-decoration: underline;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        button:hover {
            background: #1d4ed8;
        }

        select {
            font-family: inherit;
            font-size: 13px;
            padding: 5px 7px;
        }

        .menu-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .menu-item {
            display: block;
            background: white;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            color: #111827;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            font-weight: bold;
            font-size: 14px;
        }

        .menu-item:hover {
            background: #eff6ff;
        }

        .badge-high {
            color: white;
            background: #dc2626;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-middle {
            color: white;
            background: #d97706;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-low {
            color: white;
            background: #059669;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .header-inner,
            .nav-inner,
            main {
                padding-left: 20px;
                padding-right: 20px;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .menu-list {
                grid-template-columns: 1fr;
            }

            nav a {
                display: inline-block;
                margin-bottom: 6px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>中小企業・経営ポータル</h1>
        </div>
    </header>

    <nav>
        <div class="nav-inner">
            <a href="/">TOP</a>
            <a href="/documents/">文書台帳</a>
            <a href="/tasks/">タスク管理</a>
            <a href="/questionnaires/">質問票</a>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
