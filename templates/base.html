<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}中小企業・経営ポータル{% endblock %}</title>
    <style>
        body {
            font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
            margin: 0;
            background: #f5f7fa;
            color: #222;
            font-size: 14px;
            line-height: 1.7;
        }

        header {
            background: #1f2937;
            color: white;
        }

        .inline-form {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            flex-wrap: wrap;
        }

        .small-button {
            padding: 5px 9px;
            font-size: 12px;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 12px 96px;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0.03em;
        }

        nav {
            background: #374151;
        }

        .nav-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 8px 96px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 18px;
            align-items: center;
        }

        nav a {
            color: white;
            margin-right: 18px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            display: inline-block;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
        max-width: 960px;
        margin: 0 auto;
        padding: 20px 96px 40px;
    }

        .card {
            background: white;
            padding: 20px 22px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 22px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            border-left: 5px solid #2563eb;
            padding-left: 10px;
            font-size: 18px;
            letter-spacing: 0.02em;
        }

        p {
            margin-top: 8px;
            margin-bottom: 8px;
        }

        a {
            color: #2563eb;
        }

        a:hover {
            color: #1d4ed8;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .summary-card {
            background: white;
            padding: 12px 16px;
            border-radius: 10px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.07);
            min-height: 72px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .summary-label {
            font-size: 13px;
            color: #4b5563;
            margin-bottom: 6px;
            line-height: 1.35;
            font-weight: 600;
            word-break: keep-all;
            overflow-wrap: normal;
        }

        .summary-number {
            font-size: 22px;
            font-weight: bold;
            color: #111827;
            line-height: 1.2;
            white-space: nowrap;
        }

        .summary-number small {
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
            color: #6b7280;
            margin-left: 6px;
        }

        .summary-card {
            background: white;
            padding: 10px 14px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            min-height: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            box-sizing: border-box;
        }

        .summary-label {
            font-size: 14px;
            color: #4b5563;
            margin: 0;
            line-height: 1.4;
            font-weight: 600;
            word-break: keep-all;
        }

        .summary-number {
            font-size: 20px;
            font-weight: bold;
            color: #111827;
            line-height: 1;
            white-space: nowrap;
        }

        .summary-number.danger {
            color: #dc2626;
        }

        .summary-number.warning {
            color: #d97706;
        }

        .table-wrap {
            overflow-x: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 13px;
            min-width: 900px;
        }

        th {
            background: #e5e7eb;
            font-weight: bold;
            white-space: nowrap;
        }

        th, td {
            border: 1px solid #d1d5db;
            padding: 8px 10px;
            text-align: left;
            vertical-align: middle;
        }

        tr:nth-child(even) td {
            background: #fafafa;
        }

        .search-form {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
        }

        .count-text {
            color: #6b7280;
            font-size: 13px;
            margin-top: 10px;
        }

        .search-form input {
            width: 360px;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
        }

        .clear-link {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }

        .clear-link:hover {
            text-decoration: underline;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        button:hover {
            background: #1d4ed8;
        }

        select {
            font-family: inherit;
            font-size: 13px;
            padding: 5px 7px;
        }

        input,
        textarea {
            font-family: inherit;
            font-size: 13px;
        }

        .form-row {
            margin-bottom: 16px;
        }

        .input-long {
            width: 520px;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        .input-middle {
            width: 360px;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        .input-full {
            width: 100%;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .amount-input {
            width: 180px;
            max-width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        .menu-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .menu-item {
            display: block;
            background: white;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            color: #111827;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            font-weight: bold;
            font-size: 14px;
        }

        .menu-item:hover {
            background: #eff6ff;
        }

        .badge-high {
            color: white;
            background: #dc2626;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-middle {
            color: white;
            background: #d97706;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-low {
            color: white;
            background: #059669;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-status {
            color: white;
            background: #4b5563;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .header-inner,
            .nav-inner,
            main {
                padding-left: 20px;
                padding-right: 20px;
            }

            .menu-list {
                grid-template-columns: 1fr;
            }

            nav a {
                display: inline-block;
                margin-bottom: 6px;
            }
        }
        .top-fixed {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #1f2937;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }
        .scroll-list {
            max-height: 305px;
            overflow-y: auto;
            border-radius: 10px;
        }

        .scroll-list table {
            margin-bottom: 0;
        }

        .scroll-list thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #e5e7eb;
        }
        .summary-number small {
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
            color: #6b7280;
            margin-left: 6px;
        }
    </style>
</head>
<body>
    <div class="top-fixed">
        <header>
            <div class="header-inner">
                <h1>中小企業・経営ポータル</h1>
            </div>
        </header>

        <nav>
            <div class="nav-inner">
                <a href="/">TOP</a>
                <a href="/documents/">文書台帳</a>
                <a href="/tasks/">タスク管理</a>
                <a href="/questionnaires/">質問票</a>
                <a href="/questionnaires/history/">診断履歴</a>
                <a href="/workflows/">申請・承認</a>
                <a href="/expenses/">経費・旅費精算</a>
                <a href="/organizations/">組織マスタ</a>
                <a href="/manufacturing/">製造管理</a>
                <a href="/manufacturing/incidents/">製造インシデント</a>
                <a href="/kpi/">経営指標</a>
                <a href="/governance/">ガバナンス</a>
                <a href="/notifications/">通知</a>
            </div>
        </nav>
    </div>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
