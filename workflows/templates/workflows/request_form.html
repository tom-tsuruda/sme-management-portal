{% extends "base.html" %}

{% block title %}申請作成{% endblock %}

{% block content %}
<div class="card">
    <h2>申請作成</h2>
    <p>稟議・経費・出張・購買・契約審査などの申請を作成します。</p>

    <div class="list-actions">
        <a href="{% url 'workflows:request_list' %}">← 申請一覧へ戻る</a>
    </div>
</div>

<div class="card">
    <form method="post" action="{% url 'workflows:request_create' %}">
        {% csrf_token %}

        <div class="app-form-grid">
            <select name="request_type" class="input-full">
                {% for request_type in request_type_choices %}
                    <option value="{{ request_type }}">{{ request_type }}</option>
                {% endfor %}
            </select>

            <input
                type="text"
                name="title"
                required
                class="input-full"
                placeholder="件名"
            >

            <div>
                <select name="applicant_employee_id" class="input-full">
                    <option value="">申請者：社員マスタから選択</option>
                    {% for employee in employees %}
                        <option value="{{ employee.id }}">
                            {{ employee.employee_name }}（{{ employee.department_name }} / {{ employee.position_name }}）
                        </option>
                    {% endfor %}
                </select>
                <div class="form-help">社員マスタを選択した場合は、選択した社員名が優先されます。</div>
            </div>

            <input
                type="text"
                name="applicant"
                class="input-full"
                placeholder="申請者を手入力"
            >

            <div>
                <select name="department_id" class="input-full">
                    <option value="">部署：申請者の部署を使う / 部署マスタから選択</option>
                    {% for department in departments %}
                        <option value="{{ department.id }}">
                            {{ department.department_name }}
                        </option>
                    {% endfor %}
                </select>
                <div class="form-help">部署未選択の場合は、申請者の所属部署を自動で使います。</div>
            </div>

            <input
                type="text"
                name="department"
                class="input-full"
                placeholder="部署を手入力"
            >

            <input
                type="text"
                name="amount"
                placeholder="金額　例：50,000"
                class="input-full"
            >

            <div>
                <select name="approver_employee_id" class="input-full">
                    <option value="">承認者：社員マスタから選択</option>
                    {% for approver in approvers %}
                        <option value="{{ approver.id }}">
                            {{ approver.employee_name }}（{{ approver.department_name }} / {{ approver.position_name }}）
                        </option>
                    {% endfor %}
                </select>
                <div class="form-help">承認者マスタを選択した場合は、選択した承認者名が優先されます。</div>
            </div>

            <input
                type="text"
                name="approver"
                class="input-full"
                placeholder="承認者を手入力"
            >

            <textarea
                name="description"
                rows="5"
                class="input-full full"
                placeholder="申請内容"
            ></textarea>
        </div>

        <div class="form-actions">
            <button type="submit">申請する</button>
        </div>
    </form>
</div>
{% endblock %}
