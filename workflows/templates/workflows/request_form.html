{% extends "base.html" %}

{% block title %}申請作成{% endblock %}

{% block content %}
<div class="card">
    <h2>申請作成</h2>
    <p>稟議・経費・出張・購買・契約審査などの申請を作成します。</p>

    <p>
        <a href="{% url 'workflows:request_list' %}">← 申請一覧へ戻る</a>
    </p>
</div>

<div class="card">
    <form method="post" action="{% url 'workflows:request_create' %}">
        {% csrf_token %}

        <div class="form-row">
            <label>申請種別</label><br>
            <select name="request_type" class="input-middle">
                {% for request_type in request_type_choices %}
                    <option value="{{ request_type }}">{{ request_type }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <label>件名</label><br>
            <input type="text" name="title" required class="input-long">
        </div>

        <div class="form-row">
            <label>申請者</label><br>
            <div class="inline-form">
                <select name="applicant_employee_id" class="input-middle">
                    <option value="">社員マスタから選択</option>
                    {% for employee in employees %}
                        <option value="{{ employee.id }}">
                            {{ employee.employee_name }}（{{ employee.department_name }} / {{ employee.position_name }}）
                        </option>
                    {% endfor %}
                </select>

                <input type="text" name="applicant" class="input-middle" placeholder="または手入力">
            </div>
            <small>社員マスタを選択した場合は、選択した社員名が優先されます。</small>
        </div>

        <div class="form-row">
            <label>部署</label><br>
            <div class="inline-form">
                <select name="department_id" class="input-middle">
                    <option value="">申請者の部署を使う / 部署マスタから選択</option>
                    {% for department in departments %}
                        <option value="{{ department.id }}">
                            {{ department.department_name }}
                        </option>
                    {% endfor %}
                </select>

                <input type="text" name="department" class="input-middle" placeholder="または手入力">
            </div>
            <small>部署未選択の場合は、申請者の所属部署を自動で使います。手入力も可能です。</small>
        </div>

        <div class="form-row">
            <label>金額</label><br>
            <input type="text" name="amount" placeholder="例：50,000" class="amount-input">
        </div>

        <div class="form-row">
            <label>承認者</label><br>
            <div class="inline-form">
                <select name="approver_employee_id" class="input-middle">
                    <option value="">承認者マスタから選択</option>
                    {% for approver in approvers %}
                        <option value="{{ approver.id }}">
                            {{ approver.employee_name }}（{{ approver.department_name }} / {{ approver.position_name }}）
                        </option>
                    {% endfor %}
                </select>

                <input type="text" name="approver" class="input-middle" placeholder="または手入力">
            </div>
            <small>承認者マスタを選択した場合は、選択した承認者名が優先されます。</small>
        </div>

        <div class="form-row">
            <label>申請内容</label><br>
            <textarea name="description" rows="8" class="input-full"></textarea>
        </div>

        <p>
            <button type="submit">申請する</button>
        </p>
    </form>
</div>
{% endblock %}
